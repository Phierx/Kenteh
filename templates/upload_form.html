<!-- templates/upload_form.html -->
<h2>Upload Images to Your Gallery</h2>

<form method="POST" enctype="multipart/form-data" action="{{ url_for('gallery_upload') }}">
  <!-- Pass user_id as hidden input (not required) -->
  <input type="hidden" name="user_id" value="{{ user_id }}">

  <label>Item Name:</label><br>
  <input type="text" name="item_name" required><br><br>

  <label>Select Images:</label><br>
  <input type="file" name="images" multiple required><br><br>

  <button type="submit">Upload</button>
</form>
